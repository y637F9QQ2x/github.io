<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="620">
<rect width="860" height="620" fill="#fff"/>
<g transform="translate(40, 0)">
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#555"/>
</marker>
<marker id="arrowD" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#111"/>
</marker>
</defs>
<text x="390" y="36" text-anchor="middle" font-size="12" font-weight="500" fill="#111" letter-spacing="0.05em">NOFILTER  —  KERNEL-SPACE TOKEN DUPLICATION FLOW</text>
<line x1="20" y1="46" x2="760" y2="46" stroke="#eee" stroke-width="1"/>
<rect x="20" y="58" width="340" height="450" rx="0" fill="#fafafa" stroke="#eee" stroke-width="1"/>
<text x="190" y="80" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.07em">USER-MODE (BOF THREAD)</text>
<line x1="30" y1="88" x2="350" y2="88" stroke="#eee" stroke-width="1"/>
<rect x="420" y="58" width="340" height="450" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
<text x="590" y="80" text-anchor="middle" font-size="9" font-weight="500" fill="#bbb" letter-spacing="0.07em">KERNEL-SPACE (tcpip.sys)</text>
<line x1="430" y1="88" x2="750" y2="88" stroke="#333" stroke-width="1"/>
<rect x="50" y="104" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="126" text-anchor="middle" font-size="11" font-weight="500" fill="#111">1. Find BFE Service PID</text>
<text x="190" y="142" text-anchor="middle" font-size="9" font-weight="300" fill="#555">OpenSCManagerW + QueryServiceStatusEx</text>
<line x1="190" y1="154" x2="190" y2="170" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<rect x="50" y="170" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="192" text-anchor="middle" font-size="11" font-weight="500" fill="#111">2. Open Process Handles</text>
<text x="190" y="208" text-anchor="middle" font-size="9" font-weight="300" fill="#555">NtOpenProcess (indirect syscall)</text>
<line x1="190" y1="220" x2="190" y2="236" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<rect x="50" y="236" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="258" text-anchor="middle" font-size="11" font-weight="500" fill="#111">3. Scan System Handle Table</text>
<text x="190" y="274" text-anchor="middle" font-size="9" font-weight="300" fill="#555">NtQuerySystemInformation (class 64)</text>
<line x1="190" y1="286" x2="190" y2="302" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<rect x="50" y="302" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="324" text-anchor="middle" font-size="11" font-weight="500" fill="#111">4. Find WfpAle Device Handle</text>
<text x="190" y="340" text-anchor="middle" font-size="9" font-weight="300" fill="#555">NtQueryObject type + name filter</text>
<line x1="190" y1="352" x2="190" y2="368" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<rect x="50" y="368" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="390" text-anchor="middle" font-size="11" font-weight="500" fill="#111">5. Find SYSTEM Token Handle</text>
<text x="190" y="406" text-anchor="middle" font-size="9" font-weight="300" fill="#555">Token with TOKEN_DUPLICATE access</text>
<rect x="450" y="256" width="280" height="50" rx="0" fill="#222" stroke="#444" stroke-width="1"/>
<text x="590" y="278" text-anchor="middle" font-size="11" font-weight="500" fill="#eee">IOCTL 0x128000: Token Insert</text>
<text x="590" y="294" text-anchor="middle" font-size="9" font-weight="300" fill="#aaa">Kernel copies token to WFP hash table</text>
<line x1="590" y1="306" x2="590" y2="362" stroke="#555" stroke-width="1" marker-end="url(#arrowD)"/>
<rect x="450" y="362" width="280" height="50" rx="0" fill="#222" stroke="#444" stroke-width="1"/>
<text x="590" y="384" text-anchor="middle" font-size="11" font-weight="500" fill="#eee">IOCTL 0x124008: Token Query</text>
<text x="590" y="400" text-anchor="middle" font-size="9" font-weight="300" fill="#aaa">Kernel returns token from hash table</text>
<line x1="330" y1="393" x2="450" y2="281" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowG)"/>
<text x="355" y="329" text-anchor="middle" font-size="8.5" font-weight="300" fill="#555">NtDeviceIoControlFile</text>
<line x1="450" y1="387" x2="330" y2="469" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowG)"/>
<text x="355" y="420" text-anchor="middle" font-size="8.5" font-weight="300" fill="#555">SYSTEM token returned</text>
<line x1="190" y1="418" x2="190" y2="444" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<rect x="50" y="444" width="280" height="50" rx="0" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="190" y="466" text-anchor="middle" font-size="11" font-weight="500" fill="#111">6. NtSetInformationThread</text>
<text x="190" y="482" text-anchor="middle" font-size="9" font-weight="300" fill="#555">ThreadImpersonationToken (indirect syscall)</text>
<rect x="430" y="462" width="320" height="36" rx="0" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
<text x="590" y="477" text-anchor="middle" font-size="9" font-weight="400" fill="#ccc">Token duplication happens entirely in kernel.</text>
<text x="590" y="490" text-anchor="middle" font-size="9" font-weight="400" fill="#666">User-mode hooks on NtDuplicateToken are not triggered.</text>
<rect x="240" y="528" width="300" height="46" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="390" y="548" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Thread now runs as NT AUTHORITY\SYSTEM</text>
<text x="390" y="564" text-anchor="middle" font-size="9" font-weight="300" fill="#555">Verified with: token getuid</text>
<line x1="190" y1="494" x2="190" y2="504" stroke="#999" stroke-width="1"/>
<line x1="190" y1="504" x2="390" y2="528" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
<text x="390" y="598" text-anchor="middle" font-size="9" font-weight="300" fill="#666">Based on the NoFilter technique by Ron Ben-Yizhak (Deep Instinct), presented at DEF CON 31.</text>
</g>
</svg>