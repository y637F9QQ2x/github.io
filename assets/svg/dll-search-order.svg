<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="600">
<rect width="860" height="600" fill="#fff"/>
<defs>
<marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#c8c8c8"/>
</marker>
<marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#B03020"/>
</marker>
</defs>
<g transform="translate(40,0)">
<text x="390" y="26" text-anchor="middle" font-size="8.5" font-weight="500" fill="#888" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.08em">DLL SEARCH ORDER — SAFE DLL SEARCH MODE (ENABLED BY DEFAULT)</text>
<line x1="0" y1="38" x2="780" y2="38" stroke="#ebebeb" stroke-width="1"/>
<rect x="170" y="50" width="390" height="44" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
<text x="365" y="67" text-anchor="middle" font-size="8" font-weight="500" fill="#999" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.1em">APPLICATION</text>
<line x1="178" y1="72" x2="552" y2="72" stroke="#ddd" stroke-width="1"/>
<text x="365" y="86" text-anchor="middle" font-size="10.5" font-weight="400" fill="#555" font-family="Helvetica Neue, Arial, sans-serif">LoadLibrary("example.dll")  — no path specified</text>
<line x1="365" y1="94" x2="365" y2="124" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<rect x="630" y="129" width="120" height="46" fill="#B03020"/>
<text x="690" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" font-family="Helvetica Neue, Arial, sans-serif">DLL Loaded</text>
<text x="690" y="163" text-anchor="middle" font-size="8.5" font-weight="400" fill="#f0b0a0" font-family="Helvetica Neue, Arial, sans-serif">with app's privileges</text>
<rect x="170" y="124" width="390" height="56" fill="#111"/>
<text x="365" y="140" text-anchor="middle" font-size="8" font-weight="600" fill="#888" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.1em">1   APPLICATION DIRECTORY</text>
<line x1="178" y1="145" x2="552" y2="145" stroke="#2a2a2a" stroke-width="1"/>
<text x="365" y="160" text-anchor="middle" font-size="12" font-weight="500" fill="#fff" font-family="Helvetica Neue, Arial, sans-serif">Same folder as the .exe  —  searched first</text>
<text x="365" y="174" text-anchor="middle" font-size="9.5" font-weight="400" fill="#888" font-family="Helvetica Neue, Arial, sans-serif">Attacker places malicious DLL here</text>
<line x1="560" y1="152" x2="630" y2="152" stroke="#B03020" stroke-width="1.5" marker-end="url(#arrowRed)"/>
<text x="595" y="143" text-anchor="middle" font-size="8.5" font-weight="500" fill="#999" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.05em">FOUND</text>
<line x1="365" y1="180" x2="365" y2="210" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="372" y="193" text-anchor="start" font-size="8.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.04em">not found</text>
<rect x="170" y="210" width="390" height="56" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
<text x="365" y="226" text-anchor="middle" font-size="8" font-weight="500" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.08em">2   SYSTEM DIRECTORY</text>
<line x1="178" y1="231" x2="552" y2="231" stroke="#e8e8e8" stroke-width="1"/>
<text x="365" y="247" text-anchor="middle" font-size="11" font-weight="400" fill="#444" font-family="Helvetica Neue, Arial, sans-serif">C:\Windows\System32   (or SysWOW64 for 32-bit processes)</text>
<line x1="365" y1="266" x2="365" y2="296" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="372" y="279" text-anchor="start" font-size="8.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.04em">not found</text>
<rect x="170" y="296" width="390" height="56" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
<text x="365" y="312" text-anchor="middle" font-size="8" font-weight="500" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.08em">3   WINDOWS DIRECTORY</text>
<line x1="178" y1="317" x2="552" y2="317" stroke="#e8e8e8" stroke-width="1"/>
<text x="365" y="333" text-anchor="middle" font-size="11" font-weight="400" fill="#444" font-family="Helvetica Neue, Arial, sans-serif">C:\Windows  —  write access requires Administrator</text>
<line x1="365" y1="352" x2="365" y2="382" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="372" y="365" text-anchor="start" font-size="8.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.04em">not found</text>
<rect x="170" y="382" width="390" height="56" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
<text x="365" y="398" text-anchor="middle" font-size="8" font-weight="500" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.08em">4   CURRENT WORKING DIRECTORY</text>
<line x1="178" y1="403" x2="552" y2="403" stroke="#e8e8e8" stroke-width="1"/>
<text x="365" y="419" text-anchor="middle" font-size="11" font-weight="400" fill="#444" font-family="Helvetica Neue, Arial, sans-serif">The process's working directory at the time of the call</text>
<line x1="365" y1="438" x2="365" y2="468" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="372" y="451" text-anchor="start" font-size="8.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.04em">not found</text>
<rect x="170" y="468" width="390" height="56" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
<text x="365" y="484" text-anchor="middle" font-size="8" font-weight="500" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.08em">5   PATH ENVIRONMENT VARIABLE</text>
<line x1="178" y1="489" x2="552" y2="489" stroke="#e8e8e8" stroke-width="1"/>
<text x="365" y="505" text-anchor="middle" font-size="11" font-weight="400" fill="#444" font-family="Helvetica Neue, Arial, sans-serif">Each directory listed in PATH, checked in sequence</text>
<line x1="365" y1="524" x2="365" y2="548" stroke="#c8c8c8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
<text x="372" y="535" text-anchor="start" font-size="8.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif" letter-spacing="0.04em">not found</text>
<rect x="170" y="548" width="390" height="32" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 3"/>
<text x="365" y="568" text-anchor="middle" font-size="10.5" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif">LoadLibrary() returns NULL  —  DLL not found</text>
</g>
</svg>