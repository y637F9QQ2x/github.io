<svg viewBox="0 0 860 226" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="226">
<rect width="860" height="226" fill="#fff"/>
<g transform="translate(40, 0)">
<text x="390" y="32" text-anchor="middle" font-size="11" font-weight="500" fill="#111" letter-spacing="0.04em">Pipe Buffer Sizing — Preventing Deadlock</text>
<line x1="20" y1="40" x2="760" y2="40" stroke="#eee" stroke-width="1"/>
<rect x="0" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#c33" stroke-width="1.5"/>
<rect x="0" y="52" width="375" height="26" fill="#c33"/>
<text x="187" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">PROBLEM</text>
<text x="187" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">CreatePipe(&amp;hR, &amp;hW, &amp;sa, 0)</text>
<text x="187" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Default buffer = 4KB only</text>
<text x="187" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Child writes &gt; 4KB → WriteFile blocks</text>
<text x="187" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">BOF waits for child exit → also blocks</text>
<text x="187" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Both blocked forever = deadlock</text>
<rect x="405" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#2a7" stroke-width="1.5"/>
<rect x="405" y="52" width="375" height="26" fill="#2a7"/>
<text x="592" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">SOLUTION</text>
<text x="592" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">CreatePipe(&amp;hR, &amp;hW, &amp;sa, 1048576)</text>
<text x="592" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">1MB buffer handles any practical output</text>
<text x="592" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Child WriteFile never blocks</text>
<text x="592" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">BOF WaitForSingleObject completes</text>
<text x="592" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Pipe is drained after child exits</text>
<line x1="379" y1="118" x2="401" y2="118" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<text x="390" y="204" text-anchor="middle" font-size="8.5" font-weight="300" fill="#666">Affects both exec mode (NtWaitForSingleObject) and PS mode (Invoke_3 blocks the thread).</text>
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#999"/>
</marker>
</defs>
</g>
</svg>