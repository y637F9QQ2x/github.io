<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="460">
<rect width="860" height="460" fill="#fff"/>
<g transform="translate(40, 0)">
<defs>
