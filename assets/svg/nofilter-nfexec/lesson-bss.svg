<text x="525" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#c33" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">static int z;  crashes here</text>
<rect x="110" y="260" width="560" height="52" rx="0" fill="#e8f5e9" stroke="#2a7" stroke-width="1.4"/>
<text x="124" y="280" text-anchor="start" font-size="12" font-weight="700" fill="#2a7">Fix:</text>
<text x="160" y="280" text-anchor="start" font-size="11" font-weight="500" fill="#222" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">__attribute__((section(".data"))) static char *g_ob = (char*)(ULONG_PTR)1;</text>
<text x="124" y="300" text-anchor="start" font-size="10" font-weight="400" fill="#555">Forces variable into .data (mapped). Use sentinel value instead of NULL (zero = .bss).</text></g></svg>