<rect x="0" y="452" width="220" height="18" rx="0" fill="#eee" stroke="#ccc" stroke-width="1"/>
<text x="110" y="464" text-anchor="middle" font-size="8.5" font-weight="500" fill="#333">① Just before the syscall fires</text>
<rect x="6" y="474" width="208" height="24" rx="0" fill="#e4f5e4" stroke="#ccc" stroke-width="1"/>
<text x="14" y="489" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP]</text>
<text x="135" y="489" text-anchor="middle" font-size="8.5" font-weight="500" fill="#2a7">ntdll ret gadget  (FAKE)</text>
<rect x="6" y="498" width="208" height="24" rx="0" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
<text x="14" y="513" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP+8]</text>
<text x="135" y="513" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">BOF caller return</text>
<text x="110" y="536" text-anchor="middle" font-size="8.5" font-weight="500" fill="#444">RIP = stub's jmp</text>
<rect x="280" y="452" width="220" height="110" rx="0" fill="#fff" stroke="#ccc" stroke-width="1"/>
<rect x="280" y="452" width="220" height="18" rx="0" fill="#eee" stroke="#ccc" stroke-width="1"/>
<text x="390" y="464" text-anchor="middle" font-size="8.5" font-weight="500" fill="#333">② After syscall;ret  (1st pop)</text>
<rect x="286" y="474" width="208" height="24" rx="0" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
<text x="294" y="489" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP]</text>
<text x="415" y="489" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">BOF caller return</text>
<rect x="286" y="498" width="208" height="24" rx="0" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
<text x="294" y="513" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP+8]</text>
<text x="415" y="513" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">shadow space</text>
<text x="390" y="536" text-anchor="middle" font-size="8.5" font-weight="500" fill="#2a7">RIP = ntdll ret gadget  ('ret')</text>
<rect x="560" y="452" width="220" height="110" rx="0" fill="#fff" stroke="#ccc" stroke-width="1"/>
<rect x="560" y="452" width="220" height="18" rx="0" fill="#eee" stroke="#ccc" stroke-width="1"/>
<text x="670" y="464" text-anchor="middle" font-size="8.5" font-weight="500" fill="#333">③ After ntdll's ret  (2nd pop)</text>
<rect x="566" y="474" width="208" height="24" rx="0" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
<text x="574" y="489" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP]</text>
<text x="695" y="489" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">shadow space</text>
<rect x="566" y="498" width="208" height="24" rx="0" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
<text x="574" y="513" text-anchor="start" font-size="8" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">[RSP+8]</text>
