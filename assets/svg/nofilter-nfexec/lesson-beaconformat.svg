<text x="206" y="204" text-anchor="middle" font-size="13" font-weight="600" fill="#c33" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">maxsz</text>
<text x="258" y="204" text-anchor="start" font-size="14" font-weight="400" fill="#333" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">,</text>
