<svg viewBox="0 0 860 468" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="468"><rect width="860" height="468" fill="#fff"/><g transform="translate(40,0)"><text x="390" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#111" letter-spacing="0.04em">BeaconFormatAlloc — WHY IT BREAKS AND HOW TO FIX IT</text>
