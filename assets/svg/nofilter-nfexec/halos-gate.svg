<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="460"><rect width="860" height="460" fill="#fff"/><g transform="translate(40,0)"><text x="390" y="28" text-anchor="middle" font-size="13" font-weight="500" fill="#111" letter-spacing="0.05em">HALO'S GATE — RECOVERING THE SSN WHEN THE STUB IS HOOKED</text>
