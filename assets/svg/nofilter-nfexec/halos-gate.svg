<text x="456" y="175" text-anchor="start" font-size="10.5" font-weight="600" fill="#222">Walk −32 bytes upward</text>
<text x="456" y="191" text-anchor="start" font-size="9" font-weight="400" fill="#444" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">read NtFnB prologue: 4C 8B D1 B8 4A ··</text>
<text x="456" y="205" text-anchor="start" font-size="9.5" font-weight="600" fill="#2a7" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">→ neighbour SSN = 0x4A</text>
