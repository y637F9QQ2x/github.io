<text x="170" y="56" text-anchor="middle" font-size="10.5" font-weight="600" fill="#222" letter-spacing="0.04em" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">ntdll.dll  .text</text>
<text x="170" y="70" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">(memory layout — addresses grow downward)</text>
<text x="560" y="56" text-anchor="middle" font-size="10.5" font-weight="600" fill="#222" letter-spacing="0.04em">Halo's Gate algorithm</text>
<text x="560" y="70" text-anchor="middle" font-size="8.5" font-weight="400" fill="#888">(runs inside the BOF, reading ntdll's bytes)</text>
