<text x="456" y="245" text-anchor="start" font-size="10.5" font-weight="600" fill="#222">Walk +32 bytes downward</text>
<text x="456" y="261" text-anchor="start" font-size="9" font-weight="400" fill="#444" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">read NtFnD prologue: 4C 8B D1 B8 4C ··</text>
<text x="456" y="275" text-anchor="start" font-size="9.5" font-weight="600" fill="#2a7" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">→ neighbour SSN = 0x4C</text>
<path d="M 420 252 C 360 252, 356 294, 276 294" stroke="#2a7" stroke-width="1.4" fill="none" marker-end="url(#arrowGn)"/>
<rect x="420" y="294" width="280" height="70" rx="0" fill="#f0f5fc" stroke="#36c" stroke-width="1.2"/>
<circle cx="438" cy="312" r="10" fill="#36c"/>
<text x="438" y="315.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">4</text>
<text x="456" y="315" text-anchor="start" font-size="10.5" font-weight="600" fill="#222">Derive NtTarget's SSN</text>
<text x="456" y="331" text-anchor="start" font-size="9" font-weight="400" fill="#444" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">neighbour_above + 1 = 0x4A + 1 = 0x4B</text>
<text x="456" y="345" text-anchor="start" font-size="9.5" font-weight="600" fill="#36c" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">NtTarget.SSN = 0x4B</text>
<text x="456" y="359" text-anchor="start" font-size="8.5" font-weight="400" fill="#888" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">(or: neighbour_below − 1 = 0x4C − 1 = 0x4B)</text></g></svg>