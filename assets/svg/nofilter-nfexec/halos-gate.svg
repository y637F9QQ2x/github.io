<circle cx="438" cy="102" r="10" fill="#c33"/>
<text x="438" y="105.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">1</text>
<text x="456" y="105" text-anchor="start" font-size="10.5" font-weight="600" fill="#222">Read NtTarget's first byte</text>
<text x="456" y="121" text-anchor="start" font-size="9" font-weight="400" fill="#444" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">first byte = 0xE9 (JMP opcode)</text>
<text x="456" y="135" text-anchor="start" font-size="9.5" font-weight="600" fill="#c33" font-family="SFMono-Regular,Menlo,Monaco,Consolas,monospace">→ hook detected on this stub</text>
