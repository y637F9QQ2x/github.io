<text x="455" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">Reads SYSTEM token</text>
<line x1="455" y1="94" x2="455" y2="122" stroke="#ccc" stroke-width="1"/>
<rect x="524" y="122" width="125" height="52" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="586" y="144" text-anchor="middle" font-size="9.5" font-weight="500" fill="#111">Execute command</text>
<text x="586" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">CreateProcess / CLR</text>
<line x1="586" y1="94" x2="586" y2="122" stroke="#ccc" stroke-width="1"/>
<rect x="655" y="122" width="125" height="52" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="717" y="144" text-anchor="middle" font-size="9.5" font-weight="500" fill="#111">token revert</text>
<text x="717" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">Impersonation cleared</text>
<line x1="717" y1="94" x2="717" y2="122" stroke="#ccc" stroke-width="1"/>
<text x="0" y="194" text-anchor="start" font-size="8" font-weight="500" fill="#666" letter-spacing="0.05em">THREAD TOKEN STATE:</text>
