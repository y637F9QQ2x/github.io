<text x="62" y="144" text-anchor="middle" font-size="9.5" font-weight="500" fill="#111">IOCTL token theft</text>
<text x="62" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">Kernel duplicates token</text>
