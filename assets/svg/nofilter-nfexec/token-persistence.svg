<text x="96" y="220" text-anchor="middle" font-size="9" font-weight="400" fill="#555">User</text>
<rect x="193" y="200" width="430" height="30" rx="0" fill="#111"/>
<text x="408" y="220" text-anchor="middle" font-size="10" font-weight="500" fill="#eee">NT AUTHORITY\SYSTEM</text>
<rect x="623" y="200" width="157" height="30" rx="0" fill="#eee" stroke="#ddd" stroke-width="1"/>
<text x="701" y="220" text-anchor="middle" font-size="9" font-weight="400" fill="#555">User</text>
<text x="390" y="254" text-anchor="middle" font-size="9" font-weight="300" fill="#666">The impersonation token stays on the Demon thread until explicitly reverted. Multiple nfexec calls reuse the same token.</text>
