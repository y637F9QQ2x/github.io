<text x="193" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">Impersonation applied</text>
<line x1="193" y1="94" x2="193" y2="122" stroke="#ccc" stroke-width="1"/>
<rect x="262" y="122" width="125" height="52" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="324" y="144" text-anchor="middle" font-size="9.5" font-weight="500" fill="#111">Demon idle</text>
<text x="324" y="161" text-anchor="middle" font-size="7.5" font-weight="300" fill="#555">Token stays active</text>
