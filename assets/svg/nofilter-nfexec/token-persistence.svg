<text x="272" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#333" letter-spacing="0.03em">idle</text>
<text x="475" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#333" letter-spacing="0.03em">nfexec (repeatable)</text>
<text x="701" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#333" letter-spacing="0.03em">revert</text>
