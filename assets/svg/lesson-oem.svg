<svg viewBox="0 0 860 226" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="226">
<rect width="860" height="226" fill="#fff"/>
<g transform="translate(40, 0)">
<text x="390" y="32" text-anchor="middle" font-size="11" font-weight="500" fill="#111" letter-spacing="0.04em">OEM Codepage — Non-ASCII Output Conversion</text>
<line x1="20" y1="40" x2="760" y2="40" stroke="#eee" stroke-width="1"/>
<rect x="0" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#c33" stroke-width="1.5"/>
<rect x="0" y="52" width="375" height="26" fill="#c33"/>
<text x="187" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">PROBLEM</text>
<text x="187" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">ipconfig outputs in OEM codepage</text>
<text x="187" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Japanese Windows: Shift-JIS (CP932)</text>
<text x="187" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">English Windows: CP437</text>
<text x="187" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Havoc console expects UTF-8</text>
<text x="187" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Without conversion: garbled text (mojibake)</text>
<rect x="405" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#2a7" stroke-width="1.5"/>
<rect x="405" y="52" width="375" height="26" fill="#2a7"/>
<text x="592" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">SOLUTION</text>
<text x="592" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Two-step conversion required:</text>
<text x="592" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">1. OEM → UTF-16 (MultiByteToWideChar)</text>
<text x="592" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">   with CP_OEMCP (codepage = 1)</text>
<text x="592" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">2. UTF-16 → UTF-8 (WideCharToMultiByte)</text>
<text x="592" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">   with CP_UTF8 (codepage = 65001)</text>
<line x1="379" y1="118" x2="401" y2="118" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<text x="390" y="204" text-anchor="middle" font-size="8.5" font-weight="300" fill="#666">No direct OEM-to-UTF-8 API exists in Windows. Must go through UTF-16 as intermediate.</text>
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#999"/>
</marker>
</defs>
</g>
</svg>