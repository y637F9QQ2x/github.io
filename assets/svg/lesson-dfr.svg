<svg viewBox="0 0 860 226" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="226">
<rect width="860" height="226" fill="#fff"/>
<g transform="translate(40, 0)">
<text x="390" y="32" text-anchor="middle" font-size="11" font-weight="500" fill="#111" letter-spacing="0.04em">DFR — Declaration Decorators</text>
<line x1="20" y1="40" x2="760" y2="40" stroke="#eee" stroke-width="1"/>
<rect x="0" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#c33" stroke-width="1.5"/>
<rect x="0" y="52" width="375" height="26" fill="#c33"/>
<text x="187" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">PROBLEM</text>
<text x="187" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Win32 API: must use WINAPI (__stdcall)</text>
<text x="187" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">CRT funcs: must use __cdecl</text>
<text x="187" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Wrong decorator: stack corruption</text>
<text x="187" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Compiles and links without error</text>
<text x="187" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Crash may occur much later in execution</text>
<rect x="405" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#2a7" stroke-width="1.5"/>
<rect x="405" y="52" width="375" height="26" fill="#2a7"/>
<text x="592" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">SOLUTION</text>
<text x="592" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">DECLSPEC_IMPORT LONG WINAPI</text>
<text x="592" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">  NTDLL$NtOpenProcess(...);</text>
<text x="592" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333"></text>
<text x="592" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">DECLSPEC_IMPORT void * __cdecl</text>
<text x="592" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">  MSVCRT$calloc(size_t, size_t);</text>
<line x1="379" y1="118" x2="401" y2="118" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<text x="390" y="204" text-anchor="middle" font-size="8.5" font-weight="300" fill="#666">Also: DLL name must be exact. WS2_32 (correct) vs WSOCK32 (wrong) — links fine, fails at runtime.</text>
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#999"/>
</marker>
</defs>
</g>
</svg>