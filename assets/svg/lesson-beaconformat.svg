<svg viewBox="0 0 860 226" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="226">
<rect width="860" height="226" fill="#fff"/>
<g transform="translate(40, 0)">
<text x="390" y="32" text-anchor="middle" font-size="11" font-weight="500" fill="#111" letter-spacing="0.04em">BeaconFormatAlloc — Argument Order</text>
<line x1="20" y1="40" x2="760" y2="40" stroke="#eee" stroke-width="1"/>
<rect x="0" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#c33" stroke-width="1.5"/>
<rect x="0" y="52" width="375" height="26" fill="#c33"/>
<text x="187" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">PROBLEM</text>
<text x="187" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">LocalAlloc(maxsz, 1) is called</text>
<text x="187" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">LocalAlloc expects (flags, size)</text>
<text x="187" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Actual call: (size, 1) → allocates 1 byte</text>
<text x="187" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">BeaconFormatPrintf writes past buffer</text>
<text x="187" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Result: memory corruption or silent crash</text>
<rect x="405" y="52" width="375" height="132" rx="0" fill="#fff" stroke="#2a7" stroke-width="1.5"/>
<rect x="405" y="52" width="375" height="26" fill="#2a7"/>
<text x="592" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#fff" letter-spacing="0.06em">SOLUTION</text>
<text x="592" y="100" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Avoid BeaconFormat* entirely</text>
<text x="592" y="116" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Use MSVCRT$calloc(size, 1) to allocate</text>
<text x="592" y="132" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Use MSVCRT$vsnprintf to format text</text>
<text x="592" y="148" text-anchor="middle" font-size="9" font-weight="300" fill="#333">Call BeaconOutput once at the end</text>
<text x="592" y="164" text-anchor="middle" font-size="9" font-weight="300" fill="#333">BeaconOutput works correctly standalone</text>
<line x1="379" y1="118" x2="401" y2="118" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<text x="390" y="204" text-anchor="middle" font-size="8.5" font-weight="300" fill="#666">ObjectApi.c line 348. BeaconOutput is safe (line 305) — only BeaconFormat* is affected.</text>
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#999"/>
</marker>
</defs>
</g>
</svg>