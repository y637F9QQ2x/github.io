<svg viewBox="0 0 860 466" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="466">
<rect width="860" height="466" fill="#fff"/>
<g transform="translate(40, 0)">
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#555"/>
</marker>
</defs>
<text x="390" y="36" text-anchor="middle" font-size="12" font-weight="500" fill="#111" letter-spacing="0.05em">NFEXEC  —  PATCHLESS AMSI / ETW BYPASS VIA HARDWARE BREAKPOINTS</text>
<line x1="20" y1="46" x2="760" y2="46" stroke="#eee" stroke-width="1"/>
<text x="390" y="70" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.07em">SETUP PHASE (AFTER CLR Start, BEFORE CreateDomain)</text>
<rect x="40" y="86" width="220" height="50" rx="0" fill="#f5f5f5"/>
<text x="150" y="108" text-anchor="middle" font-size="11" font-weight="500" fill="#111">DR0 → AmsiScanBuffer</text>
<text x="150" y="124" text-anchor="middle" font-size="9" font-weight="300" fill="#555">PEB + LdrLoadDll + ExResolve</text>
<line x1="262" y1="111" x2="278" y2="111" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="280" y="86" width="220" height="50" rx="0" fill="#f5f5f5"/>
<text x="390" y="108" text-anchor="middle" font-size="11" font-weight="500" fill="#111">DR1 → EtwEventWrite</text>
<text x="390" y="124" text-anchor="middle" font-size="9" font-weight="300" fill="#555">PEB + ExResolve(ntdll)</text>
<line x1="502" y1="111" x2="518" y2="111" stroke="#999" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="520" y="86" width="220" height="50" rx="0" fill="#f5f5f5"/>
<text x="630" y="108" text-anchor="middle" font-size="11" font-weight="500" fill="#111">DR7 enable bits</text>
<text x="630" y="124" text-anchor="middle" font-size="9" font-weight="300" fill="#555">NtSetContextThread</text>
<text x="390" y="170" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.07em">RUNTIME: VEH HANDLER INTERCEPTS BREAKPOINT EXCEPTIONS</text>
<rect x="40" y="186" width="320" height="130" rx="0" fill="#f5f5f5"/>
<text x="200" y="206" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.06em">AMSI BYPASS (DR0)</text>
<line x1="48" y1="212" x2="352" y2="212" stroke="#eee" stroke-width="1"/>
<text x="200" y="228" text-anchor="middle" font-size="9.5" font-weight="300" fill="#555">1. AmsiScanBuffer called by CLR</text>
<text x="200" y="244" text-anchor="middle" font-size="9.5" font-weight="300" fill="#555">2. DR0 triggers EXCEPTION_SINGLE_STEP</text>
<text x="200" y="260" text-anchor="middle" font-size="9.5" font-weight="300" fill="#555">3. VEH sets *result = AMSI_RESULT_CLEAN</text>
<text x="200" y="276" text-anchor="middle" font-size="9.5" font-weight="300" fill="#555">4. VEH sets RAX = S_OK (0x0)</text>
<text x="200" y="292" text-anchor="middle" font-size="9.5" font-weight="300" fill="#555">5. VEH skips function, re-arms DR0</text>
<rect x="420" y="186" width="320" height="130" rx="0" fill="#111"/>
<text x="580" y="206" text-anchor="middle" font-size="9" font-weight="500" fill="#bbb" letter-spacing="0.06em">ETW BYPASS (DR1)</text>
<line x1="428" y1="212" x2="732" y2="212" stroke="#333" stroke-width="1"/>
<text x="580" y="228" text-anchor="middle" font-size="9.5" font-weight="300" fill="#ccc">1. EtwEventWrite called by CLR</text>
<text x="580" y="244" text-anchor="middle" font-size="9.5" font-weight="300" fill="#ccc">2. DR1 triggers EXCEPTION_SINGLE_STEP</text>
<text x="580" y="260" text-anchor="middle" font-size="9.5" font-weight="300" fill="#ccc">3. VEH sets RAX = 0 (suppress event)</text>
<text x="580" y="276" text-anchor="middle" font-size="9.5" font-weight="300" fill="#ccc">4. VEH skips function, re-arms DR1</text>
<rect x="190" y="342" width="400" height="40" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="390" y="358" text-anchor="middle" font-size="10" font-weight="500" fill="#111">Cleanup: DR0=0, DR1=0, DR7 cleared, VEH removed</text>
<text x="390" y="372" text-anchor="middle" font-size="9" font-weight="300" fill="#555">No memory patches remain. No modified .text sections.</text>
<line x1="200" y1="316" x2="200" y2="338" marker-end="url(#arrowG)" stroke="#999" stroke-width="1"/>
<line x1="580" y1="316" x2="580" y2="338" marker-end="url(#arrowG)" stroke="#555" stroke-width="1"/>
<text x="390" y="404" text-anchor="middle" font-size="9" font-weight="300" fill="#666">HWBP = hardware breakpoint. Debug registers (DR0–DR3) are per-thread, set via NtSetContextThread.</text>
<text x="390" y="420" text-anchor="middle" font-size="9" font-weight="300" fill="#666">Unlike byte-patching (0xCC / INT3), HWBP leaves no modified memory for integrity scanners to detect.</text>
<text x="390" y="436" text-anchor="middle" font-size="9" font-weight="300" fill="#666">HWBP is thread-local: bypasses apply only to the BOF thread. Start-Job creates new threads without bypass.</text>
</g>
</svg>