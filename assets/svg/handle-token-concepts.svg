<text x="390" y="288" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.07em">PRIMARY TOKEN VS IMPERSONATION TOKEN</text>
<rect x="30" y="306" width="340" height="110" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="200" y="326" text-anchor="middle" font-size="9" font-weight="500" fill="#666" letter-spacing="0.05em">PRIMARY TOKEN</text>
<line x1="38" y1="334" x2="362" y2="334" stroke="#eee" stroke-width="1"/>
<text x="200" y="352" text-anchor="middle" font-size="10" font-weight="400" fill="#333">Attached to the process</text>
<text x="200" y="368" text-anchor="middle" font-size="10" font-weight="400" fill="#333">Defines the process identity</text>
<text x="200" y="388" text-anchor="middle" font-size="9" font-weight="300" fill="#555">Required by CreateProcessWithTokenW</text>
<text x="200" y="402" text-anchor="middle" font-size="9" font-weight="300" fill="#555">Cannot be used with NtSetInformationThread</text>
<rect x="410" y="306" width="340" height="110" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
<text x="580" y="326" text-anchor="middle" font-size="9" font-weight="500" fill="#c33" letter-spacing="0.05em">IMPERSONATION TOKEN</text>
<line x1="418" y1="334" x2="742" y2="334" stroke="#333" stroke-width="1"/>
<text x="580" y="352" text-anchor="middle" font-size="10" font-weight="400" fill="#eee">Attached to a single thread</text>
<text x="580" y="368" text-anchor="middle" font-size="10" font-weight="400" fill="#eee">Overrides the process identity</text>
<text x="580" y="388" text-anchor="middle" font-size="9" font-weight="300" fill="#aaa">Set via NtSetInformationThread</text>
<text x="580" y="402" text-anchor="middle" font-size="9" font-weight="300" fill="#aaa">Persists until token revert</text>
<text x="390" y="442" text-anchor="middle" font-size="9" font-weight="300" fill="#666">NOFILTER retrieves a primary token via IOCTL, converts it to impersonation with NtDuplicateToken, then applies it to the thread.</text>
</g>
</svg>