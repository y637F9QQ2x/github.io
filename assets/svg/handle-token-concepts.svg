<text x="390" y="183" text-anchor="middle" font-size="9.5" font-weight="400" fill="#333">lsass.exe process</text>
<rect x="310" y="206" width="160" height="32" rx="0" fill="#111" stroke="#ddd" stroke-width="1"/>
<text x="390" y="227" text-anchor="middle" font-size="9.5" font-weight="400" fill="#fff">SYSTEM token</text>
<line x1="210" y1="126" x2="310" y2="134" stroke="#999" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
<line x1="210" y1="182" x2="310" y2="222" stroke="#c33" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
