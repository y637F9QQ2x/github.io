<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif" width="860" height="560">
<rect width="860" height="560" fill="#fff"/>
<g transform="translate(40, 0)">
<defs>
<marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L8,3.5 z" fill="#999"/></marker>
<marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L8,3.5 z" fill="#c33"/></marker>
<marker id="arW" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L8,3.5 z" fill="#eee"/></marker>
</defs>
<text x="390" y="36" text-anchor="middle" font-size="12" font-weight="500" fill="#111" letter-spacing="0.04em">WINDOWS FILTERING PLATFORM (WFP) — ARCHITECTURE</text>
<line x1="20" y1="46" x2="760" y2="46" stroke="#eee" stroke-width="1"/>
<rect x="0" y="58" width="780" height="180" rx="0" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="40" y="72" text-anchor="start" font-size="8" font-weight="500" fill="#666" letter-spacing="0.06em">USER-MODE</text>
<rect x="50" y="88" width="200" height="70" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="150" y="112" text-anchor="middle" font-size="9.5" font-weight="500" fill="#333">Firewall / VPN / AV</text>
<text x="150" y="128" text-anchor="middle" font-size="8" font-weight="300" fill="#555">Normal WFP clients</text>
<text x="150" y="142" text-anchor="middle" font-size="8" font-weight="300" fill="#555">Add/remove filters via API</text>
<rect x="290" y="88" width="200" height="70" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="390" y="106" text-anchor="middle" font-size="10" font-weight="500" fill="#333">BFE Service</text>
<text x="390" y="120" text-anchor="middle" font-size="8" font-weight="300" fill="#555">svchost.exe (PID varies)</text>
<text x="390" y="136" text-anchor="middle" font-size="8" font-weight="400" fill="#333">Holds WfpAle handle</text>
<text x="390" y="150" text-anchor="middle" font-size="8" font-weight="300" fill="#555">Manages all WFP filters</text>
<rect x="530" y="88" width="200" height="70" rx="0" fill="#fff" stroke="#c33" stroke-width="1.5"/>
<text x="630" y="106" text-anchor="middle" font-size="10" font-weight="500" fill="#c33">Attacker BOF</text>
<text x="630" y="120" text-anchor="middle" font-size="8" font-weight="300" fill="#555">Duplicates BFE handle</text>
<text x="630" y="136" text-anchor="middle" font-size="8" font-weight="400" fill="#c33">Sends IOCTLs directly</text>
<text x="630" y="150" text-anchor="middle" font-size="8" font-weight="300" fill="#555">to \Device\WfpAle</text>
<line x1="250" y1="123" x2="290" y2="123" stroke="#999" stroke-width="1" marker-end="url(#arG)"/>
<text x="270" y="117" text-anchor="middle" font-size="7" font-weight="300" fill="#666">WFP API</text>
<line x1="490" y1="150" x2="530" y2="150" stroke="#c33" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arR)"/>
<text x="510" y="168" text-anchor="middle" font-size="7" font-weight="400" fill="#c33">NtDuplicateObject</text>
<text x="510" y="180" text-anchor="middle" font-size="6.5" font-weight="300" fill="#888">(steal WfpAle handle)</text>
<line x1="390" y1="158" x2="220" y2="288" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arG)"/>
<text x="370" y="252" text-anchor="middle" font-size="7.5" font-weight="400" fill="#bbb">IOCTL</text>
<line x1="630" y1="158" x2="280" y2="288" stroke="#c33" stroke-width="1.5" marker-end="url(#arR)"/>
<text x="640" y="252" text-anchor="middle" font-size="7.5" font-weight="500" fill="#ff6666">IOCTL (abused)</text>
<rect x="0" y="238" width="780" height="20" rx="0" fill="#111"/>
<text x="390" y="252" text-anchor="middle" font-size="8" font-weight="500" fill="#999" letter-spacing="0.08em">USER-MODE / KERNEL-MODE BOUNDARY</text>
<rect x="0" y="258" width="780" height="260" rx="0" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
<text x="40" y="272" text-anchor="start" font-size="8" font-weight="500" fill="#666" letter-spacing="0.06em">KERNEL-MODE (tcpip.sys)</text>
<rect x="70" y="288" width="300" height="80" rx="0" fill="#252525" stroke="#444" stroke-width="1"/>
<text x="220" y="306" text-anchor="middle" font-size="10" font-weight="500" fill="#eee">\Device\WfpAle</text>
<line x1="78" y1="312" x2="362" y2="312" stroke="#444" stroke-width="1"/>
<text x="220" y="328" text-anchor="middle" font-size="8.5" font-weight="300" fill="#aaa">Receives IOCTL commands</text>
<text x="220" y="344" text-anchor="middle" font-size="8.5" font-weight="400" fill="#eee">0x128000: Insert token into table</text>
<text x="220" y="360" text-anchor="middle" font-size="8.5" font-weight="400" fill="#eee">0x124008: Retrieve token from table</text>
<rect x="410" y="288" width="300" height="80" rx="0" fill="#252525" stroke="#444" stroke-width="1"/>
<text x="560" y="306" text-anchor="middle" font-size="10" font-weight="500" fill="#eee">Token Hash Table</text>
<line x1="418" y1="312" x2="702" y2="312" stroke="#444" stroke-width="1"/>
<text x="560" y="328" text-anchor="middle" font-size="8.5" font-weight="300" fill="#aaa">gAleMasterHashTable</text>
<text x="560" y="344" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c33">tcpip.sys duplicates token internally</text>
<text x="560" y="360" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c33">No NtDuplicateToken call is made</text>
<line x1="370" y1="328" x2="410" y2="328" stroke="#c33" stroke-width="1.5" marker-end="url(#arR)"/>
<text x="390" y="320" text-anchor="middle" font-size="7" font-weight="400" fill="#c33">kernel-internal</text>
<text x="390" y="338" text-anchor="middle" font-size="7" font-weight="400" fill="#c33">DuplicateToken</text>
<line x1="410" y1="342" x2="370" y2="342" stroke="#999" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arG)"/>
<text x="390" y="354" text-anchor="middle" font-size="7" font-weight="300" fill="#888">token handle returned</text>
<line x1="300" y1="298" x2="650" y2="164" stroke="#999" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arG)"/>
<rect x="40" y="392" width="700" height="50" rx="0" fill="#222" stroke="#444" stroke-width="1"/>
<text x="390" y="412" text-anchor="middle" font-size="9.5" font-weight="500" fill="#ccc">Filter Engine (50+ kernel-mode layers)</text>
<text x="390" y="430" text-anchor="middle" font-size="8" font-weight="300" fill="#888">Inspects packets, applies firewall rules, invokes callouts</text>
<rect x="40" y="462" width="700" height="40" rx="0" fill="#222" stroke="#444" stroke-width="1"/>
<text x="390" y="478" text-anchor="middle" font-size="9.5" font-weight="500" fill="#ccc">Network Stack (TCP/IP)</text>
<text x="390" y="494" text-anchor="middle" font-size="8" font-weight="300" fill="#888">Inbound and outbound network traffic</text>
<line x1="370" y1="442" x2="370" y2="462" stroke="#555" stroke-width="1" marker-end="url(#arW)"/>
<line x1="410" y1="462" x2="410" y2="442" stroke="#555" stroke-width="1" marker-end="url(#arW)"/>
<line x1="220" y1="368" x2="330" y2="392" stroke="#555" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arW)"/>
<text x="390" y="538" text-anchor="middle" font-size="9" font-weight="300" fill="#666">Based on Microsoft WFP documentation and Ron Ben-Yizhak’s NoFilter research (DEF CON 31).</text>
<text x="60" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x2776;</text>
<text x="300" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x2777;</text>
<text x="542" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x2778;</text>
<text x="600" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x2779;</text>
<text x="376" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x277A;</text>
<text x="376" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x277B;</text>
<text x="284" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#c33">&#x277C;</text>
</g></svg>