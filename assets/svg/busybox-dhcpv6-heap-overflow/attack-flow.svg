<circle cx="412" cy="205" r="12" fill="#444"/>
<text x="412" y="209" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" font-family="Helvetica Neue, Arial, sans-serif">1</text>
<text x="432" y="200" text-anchor="start" font-size="10" font-weight="600" fill="#333" font-family="Helvetica Neue, Arial, sans-serif">Parse option header</text>
<text x="432" y="216" text-anchor="start" font-size="10" fill="#888" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">code = 0x0017, length = 0</text>
