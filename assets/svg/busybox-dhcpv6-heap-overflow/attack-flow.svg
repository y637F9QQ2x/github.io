<text x="185" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#c33" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">00</text>
<text x="185" y="379" text-anchor="middle" font-size="9" fill="#888" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Len</text>
<rect x="215" y="350" width="54" height="36" fill="#fff" stroke="#c33" rx="0"/>
<text x="242" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#c33" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">00</text>
<text x="242" y="379" text-anchor="middle" font-size="9" fill="#888" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Len</text>
<text x="282" y="362" text-anchor="start" font-size="9.5" fill="#555" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">= 0x0017 (23)</text>
<text x="282" y="378" text-anchor="start" font-size="9.5" fill="#c33" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Length = 0</text>
<text x="390" y="180" text-anchor="start" font-size="10" font-weight="600" fill="#555" font-family="Helvetica Neue, Arial, sans-serif">PROCESSING PIPELINE</text>
