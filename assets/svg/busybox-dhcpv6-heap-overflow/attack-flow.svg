<text x="128" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#c33" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">17</text>
<text x="128" y="379" text-anchor="middle" font-size="9" fill="#888" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Code</text>
