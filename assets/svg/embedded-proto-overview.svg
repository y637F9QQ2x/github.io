<text x="390" y="289" text-anchor="middle" font-size="8.5" font-weight="400" fill="#666" font-family="Helvetica Neue, Arial, sans-serif">assert() used as sole bounds check —</text>
<text x="390" y="303" text-anchor="middle" font-size="8.5" font-weight="400" fill="#666" font-family="Helvetica Neue, Arial, sans-serif">silently removed in release builds</text>
