<text x="654" y="289" text-anchor="middle" font-size="9" font-weight="400" fill="#444" font-family="Helvetica Neue, Arial, sans-serif">CWE-125: Out-of-bounds Read</text>
<line x1="536" y1="301" x2="772" y2="301" stroke="#e4e4e4" stroke-width="1"/>
