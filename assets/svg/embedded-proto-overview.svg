<text x="390" y="40" text-anchor="middle" font-size="10" font-weight="400" fill="#aaa" font-family="Helvetica Neue, Arial, sans-serif">C/C++ implementations  ·  adjacent-network attack vectors  ·  open-source codebases</text>
