<svg viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" width="680" height="660">
<rect x="0" y="0" width="680" height="660" rx="6" fill="#fff"/>
<defs>
<marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#bbb"/>
</marker>
<marker id="arrowB" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
  <path d="M0,0 L0,7 L8,3.5 z" fill="#111"/>
</marker>
</defs>
<g transform="translate(30,0)">
<text x="310.0" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#111" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing="0.01em">Authorization Chain Verification — WordPress AJAX</text>
<text x="310.0" y="52" text-anchor="middle" font-size="10.5" font-weight="300" fill="#aaa" font-family="Helvetica Neue,Arial,sans-serif">Confirms whether a nonce is obtainable by a low-privilege attacker</text>
<line x1="0" y1="60" x2="620" y2="60" stroke="#ececec" stroke-width="1"/>
<rect x="30" y="70" width="560" height="82" rx="6" fill="#f8f9ff" stroke="#d0d8ff" stroke-width="1"/>
<rect x="30" y="70" width="5" height="82" rx="0" fill="#3a5ff0"/>
<text x="48" y="92" text-anchor="start" font-size="11" font-weight="700" fill="#3a5ff0" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing="0.08em">1   IDENTIFY THE NONCE</text>
<text x="48" y="116" text-anchor="start" font-size="13" font-weight="500" fill="#111" font-family="Helvetica Neue,Arial,sans-serif">Find the action name in wp_nonce_field() or wp_create_nonce()</text>
<text x="48" y="134" text-anchor="start" font-size="11" font-weight="300" fill="#666" font-family="Helvetica Neue,Arial,sans-serif">e.g.  wp_nonce_field( 'delete_item' )  →  action name = "delete_item"</text>
<line x1="310" y1="152" x2="310" y2="174" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="30" y="174" width="560" height="82" rx="6" fill="#f8f9ff" stroke="#d0d8ff" stroke-width="1"/>
<rect x="30" y="174" width="5" height="82" rx="0" fill="#3a5ff0"/>
<text x="48" y="196" text-anchor="start" font-size="11" font-weight="700" fill="#3a5ff0" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing="0.08em">2   LOCATE NONCE SOURCES</text>
<text x="48" y="220" text-anchor="start" font-size="13" font-weight="500" fill="#111" font-family="Helvetica Neue,Arial,sans-serif">Find every page, form, or script that generates this nonce</text>
<text x="48" y="238" text-anchor="start" font-size="11" font-weight="300" fill="#666" font-family="Helvetica Neue,Arial,sans-serif">Check: admin pages, front-end templates, REST responses, inline JS vars</text>
<line x1="310" y1="256" x2="310" y2="278" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="30" y="278" width="560" height="82" rx="6" fill="#f8f9ff" stroke="#d0d8ff" stroke-width="1"/>
<rect x="30" y="278" width="5" height="82" rx="0" fill="#3a5ff0"/>
<text x="48" y="300" text-anchor="start" font-size="11" font-weight="700" fill="#3a5ff0" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing="0.08em">3   DETERMINE MINIMUM ACCESS</text>
<text x="48" y="324" text-anchor="start" font-size="13" font-weight="500" fill="#111" font-family="Helvetica Neue,Arial,sans-serif">For each source, find the minimum capability required to reach it</text>
<text x="48" y="342" text-anchor="start" font-size="11" font-weight="300" fill="#666" font-family="Helvetica Neue,Arial,sans-serif">e.g.  admin-only page requires manage_options  →  min = Administrator</text>
<line x1="310" y1="360" x2="310" y2="382" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="30" y="382" width="560" height="82" rx="6" fill="#fff8f0" stroke="#ffd0a0" stroke-width="1.5"/>
<rect x="30" y="382" width="5" height="82" rx="0" fill="#f08030"/>
<text x="48" y="404" text-anchor="start" font-size="11" font-weight="700" fill="#f08030" font-family="Helvetica Neue,Arial,sans-serif" letter-spacing="0.08em">4   COMPARE AGAINST ACTION</text>
<text x="48" y="428" text-anchor="start" font-size="13" font-weight="500" fill="#111" font-family="Helvetica Neue,Arial,sans-serif">Identify the capability the AJAX handler should enforce</text>
<text x="48" y="446" text-anchor="start" font-size="11" font-weight="300" fill="#666" font-family="Helvetica Neue,Arial,sans-serif">If min( reach ) &lt; required( action )  →  chain is exploitable</text>
<line x1="310" y1="464" x2="310" y2="502" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrowG)"/>
<polygon points="310,502 375,534 310,566 245,534" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
<text x="310" y="527" text-anchor="middle" font-size="11" font-weight="400" fill="#333" font-family="Helvetica Neue,Arial,sans-serif">min( reach )</text>
<text x="310" y="545" text-anchor="middle" font-size="11" font-weight="400" fill="#333" font-family="Helvetica Neue,Arial,sans-serif">&lt; required( action )?</text>
<line x1="375" y1="534" x2="465" y2="534" stroke="#111" stroke-width="1.5"/>
<text x="420" y="525" text-anchor="middle" font-size="11" font-weight="500" fill="#555" font-family="Helvetica Neue,Arial,sans-serif">Yes</text>
<line x1="465" y1="534" x2="465" y2="586" stroke="#111" stroke-width="1.5" marker-end="url(#arrowB)"/>
<rect x="385" y="586" width="160" height="52" rx="6" fill="#111"/>
<text x="465" y="608" text-anchor="middle" font-size="14" font-weight="600" fill="#fff" font-family="Helvetica Neue,Arial,sans-serif">Confirmed</text>
<text x="465" y="625" text-anchor="middle" font-size="10" font-weight="300" fill="#aaa" font-family="Helvetica Neue,Arial,sans-serif">ready to report</text>
<line x1="245" y1="534" x2="155" y2="534" stroke="#bbb" stroke-width="1.5"/>
<text x="200" y="525" text-anchor="middle" font-size="11" font-weight="500" fill="#999" font-family="Helvetica Neue,Arial,sans-serif">No</text>
<line x1="155" y1="534" x2="155" y2="586" stroke="#bbb" stroke-width="1.5" marker-end="url(#arrowG)"/>
<rect x="75" y="586" width="160" height="52" rx="6" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="5 3"/>
<text x="155" y="608" text-anchor="middle" font-size="12" font-weight="400" fill="#999" font-family="Helvetica Neue,Arial,sans-serif">Attack chain fails</text>
<text x="155" y="625" text-anchor="middle" font-size="10" font-weight="300" fill="#c0c0c0" font-family="Helvetica Neue,Arial,sans-serif">do not report</text>
</g>
</svg>